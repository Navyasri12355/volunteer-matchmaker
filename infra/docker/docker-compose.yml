version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-volunteer_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # FastAPI backend
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-volunteer_platform}
      GCP_PROJECT: ${GCP_PROJECT}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ../..:app

volumes:
  postgres_data:
